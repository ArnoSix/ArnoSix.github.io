<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Talleres</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="sidebar">

<h2>📋 Talleres</h2>

<button onclick="mostrarSeccion('inicio')">Inicio</button>
<button onclick="mostrarSeccion('talleres')">Talleres</button>
<button onclick="mostrarSeccion('reservas')">Reservas</button>
<button onclick="mostrarSeccion('inventario')">Inventario</button>
<button onclick="mostrarSeccion('reportes')">Exportar Excel</button>

</div>

<div class="content">

<section id="inicio" class="seccion activa">

<h1>Panel Principal</h1>

<div class="cards">

<div class="card">
<h3>Total Talleres</h3>
<p id="totalTalleres">0</p>
</div>

<div class="card">
<h3>Total Reservas</h3>
<p id="totalReservas">0</p>
</div>

<div class="card">
<h3>Total Insumos</h3>
<p id="totalInsumos">0</p>
</div>

</div>

</section>

<section id="talleres" class="seccion">

<h1>Crear Taller</h1>

<input type="text" id="nuevoTaller" placeholder="Nombre del taller">

<button onclick="crearTaller()">Agregar Taller</button>

<div id="listaTalleres"></div>

</section>

<section id="reservas" class="seccion">

<h1>Reservas</h1>

<select id="reservaTaller"></select>

<input type="text" id="docente" placeholder="Nombre docente">

<input type="date" id="fecha">

<input type="time" id="hora">

<button onclick="guardarReserva()">Guardar Reserva</button>

<table>

<thead>
<tr>
<th>Taller</th>
<th>Docente</th>
<th>Fecha</th>
<th>Hora</th>
</tr>
</thead>

<tbody id="tablaReservas"></tbody>

</table>

</section>

<section id="inventario" class="seccion">

<h1>Inventario por Taller</h1>

<select id="inventarioTaller"></select>

<div class="grid">

<div class="card">

<h2>Insumos</h2>

<input type="text" id="nombreInsumo" placeholder="Nombre insumo">

<input type="number" id="cantidadInsumo" placeholder="Cantidad">

<button onclick="agregarInsumo()">Agregar Insumo</button>

<div id="listaInsumos"></div>

</div>

<div class="card">

<h2>Herramientas</h2>

<input type="text" id="nombreHerramienta" placeholder="Nombre herramienta">

<select id="estadoHerramienta">
<option>Operativa</option>
<option>En Mantención</option>
</select>

<button onclick="agregarHerramienta()">Agregar Herramienta</button>

<div id="listaHerramientas"></div>

</div>

</div>

</section>

<section id="reportes" class="seccion">

<h1>Exportar Información</h1>

<button onclick="exportarExcel()">Descargar Excel</button>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
